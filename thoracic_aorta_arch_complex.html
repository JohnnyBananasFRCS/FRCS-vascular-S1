<script>
const QUESTIONS = [{"id": "THO-001", "number": 1, "internal_title": "Acute TBAD — TEVAR indication versus sequencing", "image": "images/thoracic/019FDE58-B4EA-460F-8C56-CCCB5DC7548F.png", "exhibit": "Synthetic CTA centreline/MPR of arch and proximal descending thoracic aorta. Displayed measurements: LCCA to LSA distance 22 mm; LSA origin diameter 12 mm; LSA length to vertebral origin 24 mm; left vertebral artery origin 24 mm from LSA ostium; primary entry tear 6 mm distal to LSA; zone 2 aortic diameter 31 mm; zone 3 aortic diameter 32 mm; right vertebral artery hypoplastic; patent LIMA-to-LAD graft.", "stem": "A 66-year-old man presents with acute type B aortic dissection and persistent severe interscapular pain despite IV beta-blockade and opiate analgesia. Systolic BP is now 115 mmHg. Creatinine and lactate are normal. CTA shows the primary entry tear 6 mm distal to the left subclavian artery. There is no rupture and no visceral malperfusion.\n\nHe has a previous CABG with a patent LIMA-to-LAD graft. The left vertebral artery is dominant and the right vertebral artery is hypoplastic.\n\nBased on the imaging, what is the most appropriate strategy?", "options": {"A": "Continue medical therapy", "B": "Zone 3 TEVAR", "C": "Branched TEVAR preserving the left subclavian artery", "D": "Left carotid-subclavian bypass followed by zone 2 TEVAR", "E": "Zone 2 TEVAR followed by left carotid-subclavian bypass"}, "answer": "D", "explanation": "He has persistent pain despite adequate anti-impulse therapy, so this is no longer a straightforward uncomplicated TBAD. The proximal tear is only 6 mm beyond the LSA, making zone 3 seal inadequate. A branched TEVAR is unattractive here because the LSA is short from ostium to vertebral origin, giving insufficient length for a standard branch strategy. Because he has a patent LIMA graft and dominant left vertebral artery, planned LSA coverage should be preceded by revascularisation if feasible.", "why_not": "A misses persistent pain as a high-risk/complicated feature. B provides inadequate proximal seal. C is limited by the short LSA landing length before the vertebral origin. E may be necessary in rupture or uncontrolled instability, but here he is haemodynamically controlled and there is time to revascularise the LSA before zone 2 coverage.", "editorial_trap": "The candidate has to distinguish indication for TEVAR from technical feasibility and sequencing."}, {"id": "THO-002", "number": 2, "internal_title": "Incidental ulcerated plaque versus high-risk PAU", "exhibit": "Synthetic axial CTA of mid descending thoracic aorta. Displayed findings: shallow eccentric contrast crater in heavy atheroma; crater depth 3 mm; crater width 7 mm; aortic diameter 34 mm; no intramural haematoma; no pleural effusion; no periaortic stranding.", "stem": "A 79-year-old man has a CTA chest for pneumonia. The report describes an incidental “ulcerated plaque versus shallow penetrating aortic ulcer” in the mid descending thoracic aorta. He has no chest or back pain. There is no intramural haematoma, pleural effusion or periaortic inflammatory change. Aortic diameter is 34 mm. The crater measures 3 mm deep and 7 mm wide.\n\nHe is already on antiplatelet therapy and a statin.\n\nWhat is the most appropriate next step?", "options": {"A": "TEVAR during this admission", "B": "Repeat CTA in 3–6 months", "C": "Repeat CTA in 48–72 hours", "D": "Open descending thoracic replacement", "E": "Discharge without aortic follow-up"}, "answer": "B", "explanation": "This is a low-risk incidental shallow ulcerated plaque or small PAU. It does not have features that mandate urgent TEVAR or very early repeat inpatient CTA: no symptoms, no IMH, no pleural effusion, no periaortic change, no large aortic diameter and no high-risk ulcer morphology. However, it should not simply be ignored. Short-interval outpatient CTA surveillance, such as 3–6 months, is reasonable to confirm stability.", "why_not": "A over-treats an incidental low-risk lesion. C is not unreasonable for a symptomatic or unstable acute aortic syndrome, but this patient is asymptomatic and lacks high-risk features. D is disproportionate. E ignores the need to establish stability.", "editorial_trap": "The difficult distractor is early repeat CTA. It sounds cautious, but the clinical context does not justify treating this as an unstable acute aortic syndrome."}, {"id": "THO-003", "number": 3, "internal_title": "Post-TEVAR spinal cord ischaemia — first manoeuvre", "exhibit": "Optional post-TEVAR sagittal CTA showing: TEVAR from zone 2 to T11; patent endograft; no retrograde type A dissection; previous infrarenal EVAR visible; occluded right internal iliac artery.", "stem": "A 72-year-old man undergoes TEVAR from zone 2 to T11 for a long descending thoracic aneurysm. He has previous infrarenal EVAR and an occluded right internal iliac artery. The left subclavian artery was covered.\n\nSix hours postoperatively he develops new bilateral leg weakness. CTA shows a patent endograft, no retrograde type A dissection and no access-vessel occlusion. His MAP is 66 mmHg, haemoglobin is 84 g/L and oxygenation is adequate. There is no CSF drain in situ.\n\nWhat is the most appropriate immediate first step?", "options": {"A": "Raise the MAP", "B": "Insert a CSF drain", "C": "Transfuse packed red cells", "D": "Perform iliac angioplasty", "E": "Revascularise the left subclavian artery"}, "answer": "A", "explanation": "This is spinal cord ischaemia until proven otherwise. The fastest immediately available manoeuvre is to raise the MAP to improve spinal cord perfusion pressure. CSF drainage, transfusion and left subclavian revascularisation may all be relevant depending on the full rescue strategy, but MAP augmentation can be instituted immediately.", "why_not": "B is important but takes organisation and carries risk, especially if anticoagulated. It is not the first instant manoeuvre. C may be required because anaemia worsens oxygen delivery, but MAP augmentation is quicker and more immediate. D could be relevant if there were access or iliac occlusive pathology compromising pelvic collateral supply, but CTA shows no access-vessel occlusion. E may be considered if LSA coverage is contributing to spinal or posterior circulation compromise, but it is not the immediate first manoeuvre.", "editorial_trap": "The answer is not the whole spinal cord rescue bundle. It asks what you do first."}, {"id": "THO-004", "number": 4, "internal_title": "Extent II TAAA — staged endovascular strategy", "exhibit": "Synthetic coronal CTA/MPR of thoracoabdominal aneurysm. Displayed findings: aneurysm begins just distal to LSA; extends to aortic bifurcation; coeliac, SMA and both renal arteries arise from aneurysmal segment; maximum diameter 67 mm; proximal descending thoracic landing zone adequate; iliac access suitable; no rupture.", "stem": "A 62-year-old fit man is referred with an asymptomatic thoracoabdominal aortic aneurysm. CTA shows aneurysmal disease from just distal to the left subclavian artery to the aortic bifurcation. The coeliac artery, SMA and both renal arteries arise from the aneurysmal segment. Maximum diameter is 67 mm. Proximal thoracic landing zone and iliac access are suitable for endovascular repair.\n\nA total endovascular strategy is being considered.\n\nWhich option best describes the aneurysm and the preferred treatment principle?", "options": {"A": "Crawford extent I; single-stage TEVAR", "B": "Crawford extent II; staged TEVAR followed by fenestrated/branched repair", "C": "Crawford extent II; single-stage TEVAR and fenestrated/branched repair", "D": "Crawford extent IV; fenestrated infrarenal repair alone", "E": "Isolated descending thoracic aneurysm; TEVAR alone"}, "answer": "B", "explanation": "This is an extent II thoracoabdominal aneurysm: extensive descending thoracic and abdominal involvement down to the bifurcation. If a total endovascular strategy is chosen, a staged approach is generally preferred where feasible to reduce spinal cord ischaemia risk, for example proximal TEVAR followed later by fenestrated or branched visceral repair. A single-stage full-length thoracoabdominal endovascular exclusion carries a higher spinal cord risk.", "why_not": "A under-classifies the aneurysm and ignores the visceral/abdominal component. C is anatomically possible in some settings but is less attractive electively because extensive single-stage coverage increases spinal cord risk. D misclassifies the aneurysm and ignores thoracic involvement. E ignores the visceral and abdominal aortic disease.", "editorial_trap": "This tests both Crawford classification and staging strategy. Endovascular repair is not a single homogeneous answer."}, {"id": "THO-005", "number": 5, "internal_title": "Young woman with aortic root aneurysm and family history", "exhibit": "Optional schematic echo/CTA report card: aortic root 44 mm; ascending aorta 38 mm; trileaflet valve; no dissection.", "stem": "A 31-year-old woman is referred because her mother died from acute type A aortic dissection aged 41. Her maternal uncle died suddenly aged 38. She is asymptomatic and is planning pregnancy. CTA shows an aortic root diameter of 44 mm and ascending aorta of 38 mm. There is no dissection.\n\nWhat is the most appropriate advice?", "options": {"A": "Reassure her that intervention is not considered until the aortic root reaches 55 mm", "B": "Start aspirin and repeat imaging in 5 years", "C": "Advise pregnancy can proceed if her blood pressure remains normal", "D": "Genetic testing and consideration of prophylactic aortic root replacement before pregnancy", "E": "Crawford type V followed by treatment"}, "answer": "D", "explanation": "The family history strongly suggests heritable thoracic aortic disease. In this context, a 44 mm aortic root is not managed using standard degenerative thresholds. Planned pregnancy increases risk, and genetic testing can clarify the syndrome and operative threshold. Prophylactic aortic root replacement should be considered before pregnancy, depending on genetic result, growth, family history and specialist assessment.", "why_not": "A wrongly applies degenerative thresholds. B is inadequate surveillance and does not address inherited risk. C underestimates pregnancy-associated aortic risk. E does not treat aortic root pathology.", "editorial_trap": "The genetic syndrome is not named. The candidate must infer heritable thoracic aortic disease and act before applying a crude 55 mm threshold."}, {"id": "THO-006", "number": 6, "internal_title": "Acute TBAD with renal malperfusion — dynamic obstruction", "exhibit": "Synthetic CTA arterial-phase coronal/MPR and axial renal-level slice showing acute TBAD from distal LSA to iliacs; proximal entry tear 20 mm distal to LSA; zone 3 landing length 28 mm; compressed true lumen through the visceral segment; right renal artery arising from the true lumen; mobile flap compromising the right renal origin; delayed right nephrogram; no fixed dissection flap extending into the renal artery itself; aortic diameter at proximal landing zone 30 mm.", "stem": "A 63-year-old man presents with acute type B aortic dissection and worsening right flank pain. His creatinine has risen from 92 to 178 µmol/L over 12 hours. Lactate is normal and there is no abdominal tenderness. CTA shows a proximal entry tear 20 mm distal to the left subclavian artery. The true lumen is compressed through the visceral aorta. The right renal artery arises from the true lumen, but its origin is intermittently compromised by the mobile dissection flap. There is a delayed right nephrogram. There is no dissection flap extending into the right renal artery itself.\n\nWhat is the most appropriate initial endovascular strategy?", "options": {"A": "Medical therapy alone", "B": "Proximal TEVAR", "C": "TEVAR with distal bare-metal dissection stent", "D": "Right renal artery stenting alone", "E": "Open right renal bypass"}, "answer": "B", "explanation": "This is renal malperfusion from dynamic obstruction. The right renal artery arises from the true lumen and there is no fixed renal artery dissection. The initial treatment is proximal TEVAR to cover the entry tear, depressurise the false lumen and restore true-lumen calibre. A distal bare-metal dissection stent may be considered if true-lumen collapse or malperfusion persists after proximal TEVAR, but it is not the initial default in this stem.", "why_not": "A ignores evolving renal malperfusion. C may be appropriate if malperfusion persists after proximal entry coverage or if there is extensive residual true-lumen collapse, but it is not required from the information given. D treats a branch as though this were fixed static renal obstruction. E is excessive as first-line when the aortic anatomy is suitable for TEVAR.", "editorial_trap": "Dynamic malperfusion is primarily treated by restoring true-lumen pressure. Do not jump straight to branch stenting or PETTICOAT unless the anatomy or response demands it."}, {"id": "THO-007", "number": 7, "internal_title": "Type A masquerading as type B","image": "images/thoracic/9F1497E9-538A-484A-A206-5C8CA74F6113.jpeg", "exhibit": "Synthetic CTA arch/ascending axial and coronal panels showing dissection flap clearly visible in descending thoracic aorta; subtle crescent of intramural haematoma in ascending aorta; small pericardial effusion; descending thoracic true/false lumen extending distally.", "stem": "A 71-year-old woman is transferred as “acute type B dissection for TEVAR”. She has chest pain radiating to the back. Blood pressure is 105/60 mmHg after analgesia. CTA shows a descending thoracic dissection but also a crescent of high attenuation within the ascending aortic wall and a small pericardial effusion. There is no visceral malperfusion.\n\nWhat is the most appropriate next step?", "options": {"A": "Zone 3 TEVAR", "B": "IV heparin and repeat CTA in 24 hours", "C": "Immediate cardiac surgery referral", "D": "Left carotid-subclavian bypass", "E": "Discharge on beta-blocker therapy"}, "answer": "C", "explanation": "Ascending aortic intramural haematoma and pericardial effusion in the context of acute aortic symptoms should be treated as type A acute aortic syndrome until proven otherwise. This is not straightforward type B dissection for TEVAR.", "why_not": "A treats the descending thoracic component while missing the immediate ascending aortic threat. B is unsafe in suspected type A acute aortic syndrome. D does not address the ascending aorta. E is unsafe.", "editorial_trap": "The referral label is bait. The imaging overrides it."}, {"id": "THO-008", "number": 8, "internal_title": "Symptomatic PAU — anti-impulse control versus urgent repair", "exhibit": "Synthetic axial CTA descending thoracic aorta showing eccentric penetrating ulcer 18 mm deep and 22 mm wide; surrounding intramural haematoma; focal pseudoaneurysm/outward contour bulge; small left pleural effusion/haemothorax; descending aorta 41 mm; adequate proximal/distal landing zones.", "stem": "An 82-year-old woman presents with sudden severe interscapular pain. CTA shows a descending thoracic penetrating aortic ulcer measuring 18 mm deep and 22 mm wide, with surrounding intramural haematoma, focal pseudoaneurysm formation and a small left pleural effusion. Proximal and distal landing zones appear adequate.\n\nWhat is the most appropriate management?", "options": {"A": "Anti-impulse therapy alone", "B": "Repeat CTA in 48–72 hours", "C": "TEVAR during the index admission", "D": "Open descending thoracic replacement", "E": "Antiplatelet therapy and outpatient surveillance"}, "answer": "C", "explanation": "This is a symptomatic high-risk PAU with adverse morphology: large/deep ulcer, surrounding IMH, pseudoaneurysm/contained rupture morphology and pleural fluid. Anti-impulse therapy is appropriate immediately while arranging treatment, but it is not definitive management. If anatomy is suitable, TEVAR during the index admission is the best answer.", "why_not": "A is incomplete; medical therapy is a bridge, not definitive treatment for this morphology. B might be reasonable for uncertain or lower-risk IMH/PAU under observation, but this lesion already has high-risk features. D may be required if endovascular repair is unsuitable, but TEVAR is preferred with adequate landing zones in this patient. E is appropriate for low-risk incidental disease, not symptomatic high-risk PAU.", "editorial_trap": "Anti-impulse therapy is not wrong — it is just not enough. The question asks management, not the first drug chart entry."}, {"id": "THO-009", "number": 9, "internal_title": "Blunt thoracic aortic injury — competing cerebral perfusion target", "exhibit": "Synthetic trauma CTA sagittal oblique panel showing aortic isthmus injury; small pseudoaneurysm 8 mm outpouching; minimal mediastinal haematoma; no active extravasation; no large haemothorax; adequate proximal and distal landing zones for TEVAR.", "stem": "A 29-year-old man is admitted after a high-speed road traffic collision. His injuries include multiple left rib fractures, pulmonary contusion, a small splenic laceration without active bleeding, severe traumatic brain injury with ICP monitoring, and blunt thoracic aortic injury.\n\nCTA shows an aortic isthmus injury with a small pseudoaneurysm and minimal mediastinal haematoma. There is no active extravasation and no large haemothorax. The proximal and distal landing zones are suitable for TEVAR.\n\nThe neurocritical care team advise that maintaining MAP above 85 mmHg is essential to preserve cerebral perfusion pressure. There is no ongoing uncontrolled torso haemorrhage.\n\nWhat is the most appropriate aortic management principle?", "options": {"A": "Anti-impulse therapy and interval CTA", "B": "Early TEVAR", "C": "Open descending thoracic repair", "D": "Delay aortic treatment until the brain injury has resolved", "E": "Permissive hypertension without aortic intervention"}, "answer": "B", "explanation": "The aortic injury is contained, but it includes a pseudoaneurysm. In some patients, selected contained injuries can be managed initially with anti-impulse therapy and surveillance. Here, however, the traumatic brain injury requires higher MAP targets to maintain cerebral perfusion. Leaving the aorta unsecured while deliberately maintaining hypertension increases rupture risk. If anatomy is suitable and there is no uncontrolled bleeding elsewhere, early TEVAR is the best answer.", "why_not": "A may be reasonable in selected patients where anti-impulse therapy can be maintained, but this patient needs higher MAP targets. C is not first-line if TEVAR anatomy is suitable. D leaves the aorta exposed during the period when hypertension is needed. E addresses the brain but ignores the aortic rupture risk.", "editorial_trap": "The associated injuries are not decoration. The TBI changes the haemodynamic target, which changes the threshold for securing the aorta."}, {"id": "THO-010", "number": 10, "internal_title": "TEVAR access — sheath size and iliac conduit", "exhibit": "Synthetic CTA access-planning panel showing descending thoracic aneurysm with adequate proximal and distal landing zones; right EIA 6.0 mm, severe tortuosity, eccentric calcium; left EIA 6.5 mm, moderate tortuosity, posterior calcium; right CIA 8.0 mm; left CIA 8.5 mm; common femoral arteries clampable; no significant thoracic seal-zone issue.", "stem": "A 76-year-old woman is planned for elective TEVAR for a 64 mm descending thoracic aneurysm. The thoracic landing zones are suitable. CTA access measurements are shown in the exhibit. The intended thoracic device requires a 24 Fr delivery system.\n\nWhat is the most appropriate access strategy?", "options": {"A": "Percutaneous right femoral access", "B": "Open right femoral exposure alone", "C": "Right iliac conduit", "D": "Left iliac conduit", "E": "Abandon TEVAR"}, "answer": "C", "explanation": "A 24 Fr delivery system is approximately 8 mm external diameter before allowing for calcification, tortuosity and loss of compliance. A 6 mm calcified, tortuous right external iliac artery is not suitable for safe delivery of the main thoracic device. In standard TEVAR setup, the main device is usually delivered from the right, with the left side used for angiography, pigtail access, buddy wires or snaring as needed. A planned right iliac conduit is therefore the best option offered. In selected cases, deployment via an axillary artery can be considered, particularly where iliofemoral access is hostile. However, that does not change the best answer in this question because the stem provides an iliac access problem suitable for a right iliac conduit.", "why_not": "A is unsafe for a 24 Fr system through a 6 mm calcified EIA. B provides femoral control but does not solve the iliac calibre and tortuosity problem. D would not address the usual main delivery route in this setup. E is too nihilistic because the thoracic repair remains feasible with planned access modification.", "editorial_trap": "The candidate must combine sheath size, iliac calibre, calcification and standard TEVAR access strategy. The stem does not tell them which side matters; they have to know."}, {"id": "THO-011", "number": 11, "internal_title": "Chronic TBAD after TEVAR — distal seal failure", "exhibit": "Synthetic CTA centreline/MPR after previous TEVAR: prior TEVAR from zone 3 to mid descending thoracic aorta; proximal seal intact; no type Ia endoleak; distal end of thoracic stent graft lands in dissected aneurysmal aorta; contrast passes beyond distal end of graft into false lumen; distal descending thoracic/thoracoabdominal diameter increased from 52 mm to 61 mm; coeliac and SMA arise from true lumen; left renal artery arises from false lumen; distal seal would require extension into the visceral segment.", "stem": "A 64-year-old man underwent TEVAR 3 years ago for chronic type B dissection with aneurysmal degeneration. CTA now shows an intact proximal seal and good remodelling of the covered proximal descending thoracic aorta. The distal end of the stent graft lands in dissected aneurysmal aorta, with contrast filling the false lumen beyond the distal graft edge. The distal descending thoracic aorta has enlarged from 52 mm to 61 mm. The coeliac artery and SMA arise from the true lumen, while the left renal artery arises from the false lumen.\n\nWhat is the most appropriate diagnosis and treatment principle?", "options": {"A": "Type Ia endoleak; proximal arch extension", "B": "Type Ib endoleak; distal extension with fenestrated/branched repair", "C": "Type II endoleak; intercostal artery embolisation", "D": "Normal post-dissection remodelling; annual surveillance", "E": "Isolated left renal stenosis; renal artery stenting"}, "answer": "B", "explanation": "The proximal seal is intact, but the distal graft edge terminates in dissected aneurysmal aorta with ongoing false-lumen filling and aneurysm growth. This is best treated as distal seal failure/type Ib endoleak in the post-dissection TEVAR setting. Because the distal seal must extend into the visceral segment and branch anatomy is complex, treatment requires distal extension with fenestrated or branched repair rather than simple distal cuffing.", "why_not": "A is wrong because the proximal seal is intact. C undercalls the problem and treats it like a benign branch endoleak. D is contradicted by sac growth. E ignores the thoracoabdominal false-lumen pressurisation and would not treat the aneurysm.", "editorial_trap": "Post-dissection TEVAR failure can behave like an endoleak problem, but the solution may be complex visceral extension rather than a simple cuff."}, {"id": "THO-012", "number": 12, "internal_title": "Arch aneurysm — redo sternotomy risk versus endovascular arch strategy", "exhibit": "Synthetic arch CTA with centreline measurements: arch aneurysm involving distal arch and proximal descending thoracic aorta; involves LSA origin and extends close to LCCA origin; zone 3 landing inadequate; zone 2 landing 7 mm; zone 1 landing 31 mm; ascending aorta diameter 34 mm; proximal descending landing beyond aneurysm adequate; femoral/iliac access suitable.", "stem": "A 78-year-old man has a symptomatic arch aneurysm extending into the proximal descending thoracic aorta. CTA measurements are shown in the exhibit. He is independent, but has had previous CABG with anterior grafts close to the sternum and patchy calcification of the distal ascending aorta.\n\nWhat is the most appropriate repair strategy?", "options": {"A": "Frozen elephant trunk", "B": "Standard zone 3 TEVAR", "C": "Zone 1 branched TEVAR with carotid-carotid bypass", "D": "Left carotid-subclavian bypass alone", "E": "Surveillance imaging in 12 months"}, "answer": "C", "explanation": "The aneurysm is symptomatic and requires treatment if feasible. Zone 3 and zone 2 seal are inadequate, while zone 1 seal is adequate. Prior CABG with anterior grafts and calcified distal ascending aorta make open arch/FET less attractive, without making him unfit for general anaesthesia. A zone 1 branched TEVAR strategy with carotid-carotid bypass is therefore the best option offered. A carotid-carotid bypass can be tunnelled anteriorly, where it is relatively exposed and potentially vulnerable to trauma or infection, or retro-oesophageally, where it may produce dysphagia-lusoria-type symptoms. These issues should be considered when planning zone 1 arch strategies.", "why_not": "A may be appropriate in a different patient, but redo sternotomy and ascending aortic features make it less attractive here. B does not provide a proximal seal. D does not treat the arch aneurysm. E is inappropriate for a symptomatic arch aneurysm.", "editorial_trap": "The candidate has to combine landing-zone anatomy with redo-open-arch risk. It is not simply endo because frail."}, {"id": "THO-013", "number": 13, "internal_title": "Shaggy thoracic aorta — consent risk", "exhibit": "Synthetic CTA arch and descending aorta: 63 mm descending thoracic aneurysm; adequate proximal and distal seal lengths; extensive irregular non-calcified mural thrombus throughout arch and descending thoracic aorta; shaggy aortic appearance; iliac access adequate; no significant carotid stenosis.", "stem": "A 78-year-old man is being consented for TEVAR for a 63 mm descending thoracic aneurysm. The proximal and distal seal zones are adequate and iliac access is suitable. CTA shows extensive irregular friable mural thrombus throughout the arch and descending thoracic aorta. He has a history of TIA but no significant carotid stenosis.\n\nWhich procedural risk is most important to emphasise in the consent discussion?", "options": {"A": "Stroke", "B": "Type II endoleak", "C": "Renal infarcts", "D": "Acute limb ischaemia", "E": "Chyle leak"}, "answer": "A", "explanation": "A shaggy thoracic aorta increases the risk of embolisation during wire, catheter and stent-graft manipulation. In this context, embolic stroke is a particularly important risk to discuss. Visceral, renal or limb embolisation may also occur, but in a thoracic arch/descending manipulation case with previous TIA, stroke is the most important consent issue.", "why_not": "B is not the dominant risk in TEVAR for this morphology. C can occur from embolisation, but stroke is the most important consent issue given arch manipulation and previous TIA. D can occur from distal embolisation or access complications, but it is less central than stroke in this anatomy. E is not a typical TEVAR consent priority.", "editorial_trap": "The anatomy is technically sealable, but the aortic wall quality changes the consent conversation."}, {"id": "THO-014", "number": 14, "internal_title": "Arch-branch stenosis in a young patient", "exhibit": "Synthetic CTA arch and supra-aortic vessels: long smooth narrowing of the left common carotid origin; long smooth narrowing of the left subclavian artery; mild descending thoracic aortic narrowing; no focal calcified plaque; vessel wall thickening.", "stem": "A 29-year-old woman presents with left arm claudication, dizziness on arm use and unequal arm pressures. CTA findings are shown in the exhibit. She also reports fatigue, night sweats and 4 kg weight loss. CRP is 68 mg/L and ESR is 74 mm/hr. Right arm BP is 148/82 and left arm BP is 92/60. Duplex shows damped left vertebral and axillary waveforms.\n\nWhat is the most appropriate initial management strategy?", "options": {"A": "Left subclavian stenting", "B": "Carotid-subclavian bypass", "C": "High-dose steroids", "D": "Optimal medical therapy", "E": "Carotid endarterectomy"}, "answer": "C", "explanation": "This pattern suggests active large-vessel vasculitis, most likely Takayasu arteritis. She has systemic symptoms, raised inflammatory markers and long smooth non-atherosclerotic arch-branch stenoses. The most appropriate initial strategy is treatment of active inflammation, usually with high-dose corticosteroids and specialist rheumatology input. Revascularisation may be required later if symptoms persist or there is critical perfusion compromise, but intervention during active disease has higher restenosis and complication risk.", "why_not": "A and B may be relevant later, but they are not the initial treatment for active vasculitis. D is too non-specific and does not address the active inflammatory disease. E is for focal carotid bifurcation atherosclerosis, not long inflammatory arch-vessel disease.", "editorial_trap": "The diagnosis is not handed over. The candidate must infer active vasculitis and avoid treating it like straightforward occlusive disease."}, {"id": "THO-015", "number": 15, "internal_title": "Suspected aortobronchial fistula — ambiguous CT", "exhibit": "Synthetic CTA chest: previous open descending thoracic graft; no active contrast extravasation; subtle perigraft soft tissue thickening; loss of fat plane between graft and left main bronchus; adjacent left lower lobe consolidation; tiny gas locule uncertain: airway versus perigraft; no large haemothorax.", "stem": "A 69-year-old man presents with haemoptysis 8 years after open descending thoracic aneurysm repair. He had a smaller self-limiting bleed 48 hours earlier. He is febrile and has coughed up approximately 150 mL of fresh blood in the emergency department.\n\nObservations after initial resuscitation are: HR 112 bpm, BP 96/58 mmHg, RR 24/min, SpO₂ 94% on 15 L oxygen, temperature 38.4°C. Haemoglobin is 96 g/L and lactate is 2.8 mmol/L.\n\nCTA shows no active extravasation, but there is perigraft soft tissue thickening, loss of the fat plane between the graft and the left main bronchus, and adjacent consolidation.\n\nWhat is the most appropriate immediate management?", "options": {"A": "IV antibiotics and nil by mouth", "B": "Bronchoscopy", "C": "TEVAR", "D": "Bilateral axillofemoral bypass", "E": "PET-CT"}, "answer": "C", "explanation": "This is aortobronchial fistula until proven otherwise: herald haemoptysis, previous thoracic graft, fever and suspicious graft-bronchial CT changes. The patient is not in extremis, but he is physiologically abnormal and has already had recurrent bleeding. CTA does not need to show active extravasation. The immediate priority is preventing catastrophic haemorrhage, and TEVAR is the best immediate option offered. It may be a bridge rather than definitive treatment, because infected graft/fistula management remains unresolved.", "why_not": "A is necessary supportive management but does not control haemorrhage. B may precipitate major bleeding and does not provide vascular control. D is not the immediate treatment for thoracic aortobronchial fistula. E may help later with infection assessment but is not the immediate step.", "editorial_trap": "The patient is not peri-arrest and the CT is not definitive. The trap is waiting for active extravasation or massive collapse before treating a herald aortobronchial bleed."}, {"id": "THO-016", "number": 16, "internal_title": "Post-TEVAR chest pain — retrograde type A dissection", "exhibit": "Synthetic CTA chest/arch: recent thoracic stent graft from zone 2 to mid descending thoracic aorta; proximal graft edge just distal to LCCA; new dissection flap in ascending aorta; small pericardial effusion; thoracic stent graft patent; no distal access-vessel occlusion.", "stem": "A 68-year-old man undergoes TEVAR for complicated acute type B dissection. The proximal landing zone measured 30 mm and a 36 mm thoracic stent graft was deployed, giving 20% oversizing. Completion angiography was satisfactory.\n\nTwelve hours later he develops central chest pain and becomes clammy. Observations are HR 118 bpm, BP 94/58 mmHg, RR 24/min, SpO₂ 96% on 4 L oxygen. ECG shows no ST elevation. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate next step?", "options": {"A": "Extend the TEVAR proximally using a branched device", "B": "Repeat CTA in 24 hours", "C": "Immediate cardiac surgery referral", "D": "Left carotid-subclavian bypass", "E": "Systemic thrombolysis"}, "answer": "C", "explanation": "This is retrograde type A dissection after TEVAR until proven otherwise. New ascending aortic dissection with chest pain, hypotension and pericardial effusion is a cardiac surgical emergency. The thoracic stent graft being patent does not make this safe to observe. The degree of oversizing is also relevant: in acute dissection, oversizing greater than 10% is associated with increased risk of retrograde type A dissection or stent-induced new entry, because the dissected aortic wall is fragile. A 36 mm graft in a 30 mm landing zone represents 20% oversizing. Excessive oversizing in acute dissection is a recognised risk factor for retrograde type A dissection and stent-induced new entry.", "why_not": "A is the tempting endovascular answer, but it treats the wrong problem and may worsen proximal aortic injury. B delays treatment of a life-threatening type A complication. D does not address the ascending aorta. E would be dangerous.", "editorial_trap": "Do not respond to every post-TEVAR problem by adding more TEVAR. The complication has moved into the ascending aorta."}, {"id": "THO-017", "number": 17, "internal_title": "Kommerell diverticulum — symptom plus morphology", "exhibit": "Synthetic CTA arch: aberrant right subclavian artery passing posterior to oesophagus; Kommerell diverticulum at origin; diverticulum diameter 38 mm; narrowest retro-oesophageal segment visible; descending thoracic aorta otherwise non-aneurysmal; right vertebral artery arises from right subclavian; suitable proximal/distal landing zones for endovascular exclusion.", "stem": "A 57-year-old woman is referred with progressive dysphagia to solids and intermittent right arm paraesthesia. CTA findings are shown in the exhibit. There is no dissection or rupture.\n\nWhat is the most appropriate management principle?", "options": {"A": "Surveillance imaging", "B": "Oesophageal dilatation", "C": "Right carotid-subclavian bypass alone", "D": "Right subclavian revascularisation with exclusion of the diverticulum", "E": "Descending TEVAR without subclavian revascularisation"}, "answer": "D", "explanation": "This is symptomatic aberrant right subclavian artery with Kommerell diverticulum. Management must address both the aneurysmal diverticulum and right subclavian/vertebral perfusion. Depending on anatomy and local expertise, this may involve open, hybrid or endovascular exclusion with right subclavian revascularisation.", "why_not": "A under-treats symptomatic aneurysmal pathology. B treats the oesophageal symptom rather than the vascular cause and aneurysm. C preserves arm perfusion but does not treat the diverticulum. E risks right arm or vertebrobasilar issues and may not adequately manage the aberrant subclavian origin.", "editorial_trap": "The issue is not just dysphagia lusoria. The aneurysmal origin changes it into a vascular repair problem."}, {"id": "THO-018", "number": 18, "internal_title": "Adult coarctation — treatment despite collaterals", "exhibit": "Synthetic CTA sagittal/coronal thoracic aorta: discrete juxtaductal coarctation; narrowest diameter 7 mm; proximal descending thoracic aorta 22 mm; extensive intercostal/internal mammary collaterals; no aneurysm at coarctation site; no arch hypoplasia.", "stem": "A 26-year-old man is investigated for resistant hypertension. Clinic BP is 168/94 mmHg in the right arm despite three agents. Femoral pulses are delayed. Echocardiography shows preserved LV function with mild LV hypertrophy. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate management?", "options": {"A": "Continue antihypertensives alone", "B": "Endovascular stenting", "C": "Surgical bypass from ascending to descending aorta", "D": "Balloon angioplasty alone", "E": "Discharge if femoral pulses are palpable"}, "answer": "B", "explanation": "This is haemodynamically significant adult coarctation with resistant hypertension and classic clinical findings. In suitable adult anatomy, endovascular stenting is commonly favoured. Collaterals show chronicity; they do not mean the lesion is harmless.", "why_not": "A does not address the fixed obstruction driving hypertension. C may be used in selected complex anatomy, but this is a discrete suitable coarctation. D has higher risk of recoil or aneurysm than covered or bare stent strategies in many adult cases. E is unsafe and ignores the clinical and imaging findings.", "editorial_trap": "Extensive collaterals can make symptoms less dramatic, but they do not remove the indication for treatment."}, {"id": "THO-019", "number": 19, "internal_title": "Acute uncomplicated TBAD — morphology and timing", "exhibit": "Synthetic CTA centreline/MPR: acute type B dissection starting 18 mm distal to LSA; no rupture; patent true lumen to visceral branches; maximum descending thoracic aortic diameter 43 mm; false lumen larger than true lumen proximally; primary entry tear 14 mm; partial false lumen thrombosis; zone 3 landing length 24 mm; proximal landing diameter 30 mm.", "stem": "A 59-year-old man presents with acute type B dissection. His pain settles with IV beta-blockade and analgesia. Systolic BP is controlled at 115 mmHg. Creatinine, lactate and limb perfusion are normal. CTA findings are shown in the exhibit. He is otherwise fit.\n\nWhat is the most appropriate management?", "options": {"A": "Best medical therapy and early surveillance", "B": "TEVAR during the acute admission", "C": "Open descending thoracic replacement", "D": "Discharge with annual CTA", "E": "Fenestrated thoracoabdominal repair"}, "answer": "A", "explanation": "He currently has uncomplicated acute TBAD: pain and blood pressure are controlled, with no rupture or malperfusion. The CTA does show adverse morphological features associated with later aneurysmal degeneration, including a relatively enlarged proximal descending aorta, a sizeable primary entry tear, dominant false lumen and partial false lumen thrombosis. These findings justify careful early surveillance and specialist follow-up, but they do not by themselves make acute-admission TEVAR the best answer.", "why_not": "B may be considered in selected subacute/high-risk uncomplicated TBAD or if complications develop, but the stem does not justify acute intervention as the best answer. C is excessive for uncomplicated TBAD. D is too lax for the early risk period and adverse morphology. E is not appropriate for this acute uncomplicated descending thoracic presentation.", "editorial_trap": "The trap is overreacting to adverse morphology. It changes follow-up intensity and later planning, but it does not automatically convert a controlled uncomplicated acute TBAD into an acute TEVAR case."}, {"id": "THO-020", "number": 20, "internal_title": "TEVAR spinal cord ischaemia risk", "exhibit": "Synthetic CTA planning image: descending thoracic aneurysm requiring TEVAR from zone 2 to T10; zone 3 landing inadequate; zone 2 landing adequate; previous infrarenal EVAR visible; left internal iliac artery occluded; right internal iliac artery patent; iliac access suitable.", "stem": "A 74-year-old man is being assessed before elective TEVAR for a symptomatic descending thoracic aneurysm. The proposed repair would extend from zone 2 to T10. He has previous infrarenal EVAR and an occluded left internal iliac artery. Renal function is normal and haemoglobin is 108 g/L.\n\nWhich feature most increases his risk of spinal cord ischaemia?", "options": {"A": "Previous infrarenal EVAR with internal iliac occlusive disease", "B": "Zone 2 proximal landing", "C": "Planned coverage to T10", "D": "Patent left subclavian artery", "E": "Staged repair strategy"}, "answer": "A", "explanation": "The strongest risk factor listed is previous infrarenal EVAR with internal iliac occlusive disease. This reduces collateral spinal cord perfusion from the pelvic circulation and increases the risk of spinal cord ischaemia after extensive thoracic aortic coverage.", "why_not": "B and C may contribute to risk, but they are less discriminating than loss of pelvic collateral reserve after previous EVAR with internal iliac disease. D is protective rather than adverse if the left subclavian remains patent. E is generally used to reduce spinal cord ischaemia risk rather than increase it.", "editorial_trap": "The question is not asking whether long thoracic coverage is risky in general. It is asking which listed factor most compromises collateral reserve."}, {"id": "THO-021", "number": 21, "internal_title": "TBAD with limb malperfusion — static iliac obstruction", "exhibit": "Synthetic CTA centreline/MPR with pelvic axial reconstruction: acute type B dissection beginning 22 mm distal to LSA; proximal descending landing zone suitable; visceral branches perfused; right common iliac artery narrowed by extension of dissection flap into the iliac origin; re-entry at right common iliac bifurcation; right external iliac true lumen markedly compressed; left iliac system patent.", "stem": "A 61-year-old man presents with acute type B dissection and right leg pain. BP is controlled with IV beta-blockade. Lactate is 2.8 mmol/L. The right foot is cool with reduced motor power in the toes; the left leg is well perfused. CTA findings are shown in the exhibit. The coeliac artery, SMA and both renal arteries are patent.\n\nWhat is the most appropriate endovascular strategy?", "options": {"A": "Proximal TEVAR alone", "B": "Right iliac stenting alone", "C": "TEVAR and right iliac stent", "D": "TEVAR and femoro-femoral crossover graft", "E": "Medical therapy and repeat CTA in 24 hours"}, "answer": "C", "explanation": "This is complicated acute TBAD with limb malperfusion. The proximal entry tear is suitable for TEVAR, but the right iliac obstruction has a static component from extension of the dissection flap into the iliac system. Proximal TEVAR treats the dissection pressurisation, while a right iliac stent directly treats the fixed iliac obstruction. TEVAR with femoro-femoral crossover graft is a valid option and an important backup if iliac stenting fails or cannot be performed, but it is not the preferred first choice here because extra-anatomical bypass adds wound and infection risk and usually involves a longer anaesthetic.", "why_not": "A may not relieve fixed iliac obstruction. B treats the limb vessel but leaves the proximal dissection pressurisation untreated. D is a valid fallback strategy, but is less attractive than endovascular iliac correction when the iliac lesion is stentable. E is unsafe with neurological deficit in the limb.", "editorial_trap": "Do not treat all malperfusion as purely dynamic. The branch anatomy determines whether TEVAR alone is enough."}, {"id": "THO-022", "number": 22, "internal_title": "Minimal blunt thoracic aortic injury", "exhibit": "Synthetic trauma CTA sagittal oblique image: small intimal flap at aortic isthmus; no pseudoaneurysm; no contour abnormality; no mediastinal haematoma; no active extravasation; aortic diameter otherwise normal.", "stem": "A 34-year-old woman is admitted after a high-speed road traffic collision. Her injuries include rib fractures, pulmonary contusions and a stable pelvic fracture. CTA findings are shown in the exhibit. She is haemodynamically stable after initial resuscitation. There is no intracranial haemorrhage and no ongoing blood loss.\n\nWhat is the most appropriate management of the aortic injury?", "options": {"A": "TEVAR during this admission", "B": "Open isthmus repair", "C": "Anti-impulse therapy and interval CTA", "D": "Systemic anticoagulation", "E": "Thoracic endograft plus left carotid-subclavian bypass"}, "answer": "C", "explanation": "This is a minimal blunt thoracic aortic injury: a small intimal flap without pseudoaneurysm, external contour abnormality, mediastinal haematoma or active extravasation. These injuries are commonly managed non-operatively with blood pressure/impulse control and surveillance imaging.", "why_not": "A is overtreatment for the lesion described. B is disproportionate and carries higher morbidity. D does not treat the injury and may be harmful in trauma. E is unnecessary without a TEVAR indication or zone 2 requirement.", "editorial_trap": "Not every traumatic aortic injury is a TEVAR. The key is distinguishing minimal intimal injury from pseudoaneurysm or contained rupture."}, {"id": "THO-023", "number": 23, "internal_title": "Distal landing after TEVAR for descending thoracic aneurysm", "exhibit": "Synthetic CTA centreline/MPR: fusiform descending thoracic aneurysm, maximum 66 mm; proximal landing zone adequate in zone 3; distal thoracic aorta tapers progressively towards the visceral segment; coeliac artery, SMA and renal arteries patent; visceral aortic segment suitable for fenestrated repair; iliac access suitable.", "stem": "A 72-year-old man is being evaluated for endovascular repair of a 66 mm descending thoracic aneurysm. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate treatment strategy?", "options": {"A": "TEVAR", "B": "TEVAR + FEVAR", "C": "TEVAR + FEVAR (staged)", "D": "Open descending thoracic replacement", "E": "Best medical therapy with surveillance imaging"}, "answer": "C", "explanation": "The aneurysm approaches the visceral segment, so TEVAR alone is unlikely to provide a durable distal repair. In suitable anatomy, a combined thoracic and fenestrated strategy is appropriate. Staging the TEVAR and FEVAR components is preferred where feasible to reduce spinal cord ischaemia risk, rather than excluding a long thoracoabdominal segment in a single sitting.", "why_not": "A does not provide a durable distal seal. B may be technically feasible, but a single-stage extensive thoracoabdominal endovascular repair carries greater spinal cord ischaemia risk. D is a reasonable alternative in selected patients, but the question asks for the preferred endovascular strategy in suitable anatomy. E is inappropriate for a 66 mm aneurysm being evaluated for repair.", "editorial_trap": "The key issue is not whether the proximal landing zone is adequate. The distal extent means TEVAR alone is insufficient, and the staging decision matters because of spinal cord risk."}, {"id": "THO-024", "number": 24, "internal_title": "Favourable remodelling after TEVAR for chronic TBAD", "exhibit": "Synthetic CTA centreline/MPR: previous TEVAR from zone 3 to mid-descending thoracic aorta; proximal and distal graft seal intact; covered thoracic false lumen thrombosed; true lumen expanded in treated segment; descending thoracic diameter reduced from 58 mm to 49 mm; distal dissected abdominal aorta 34 mm and unchanged; coeliac, SMA and renal arteries patent; no endoleak or stent-induced new entry.", "stem": "A 69-year-old man underwent TEVAR 4 years ago for chronic type B dissection with descending thoracic aneurysmal degeneration. He remains well. Surveillance CTA findings are shown in the exhibit. The covered thoracic false lumen is thrombosed, the true lumen has expanded and the treated thoracic aorta has reduced in diameter. The distal dissected abdominal aorta is stable at 34 mm.\n\nWhat is the most appropriate management?", "options": {"A": "Continue structured lifelong surveillance", "B": "Extend with fenestrated endovascular repair", "C": "Relining of the thoracic endograft", "D": "False lumen embolisation", "E": "Open thoracoabdominal replacement"}, "answer": "A", "explanation": "This is favourable remodelling after TEVAR for chronic type B dissection. The treated thoracic false lumen is thrombosed, true lumen calibre has improved and the aortic diameter has reduced. The distal dissected aorta is not aneurysmal and is stable. This requires continued lifelong surveillance of the whole aorta, but not secondary intervention at this stage.", "why_not": "B would be appropriate if there were progressive distal thoracoabdominal aneurysmal degeneration or inadequate distal seal, but that is not present. C is not indicated because there is no endoleak, migration or device failure. D is not indicated because there is no persistent false-lumen perfusion driving expansion. E is disproportionate in a stable, remodelled aorta.", "editorial_trap": "Not every post-dissection TEVAR patient with residual dissection needs further repair. False lumen thrombosis and aortic shrinkage are favourable findings; the correct response is surveillance, not intervention."}, {"id": "THO-025", "number": 25, "internal_title": "TEVAR implantation syndrome", "exhibit": "Synthetic CTA chest: TEVAR in good position; no endoleak; no sac expansion; mild peri-aortic inflammatory change; no perigraft gas; no fluid collection; no oesophageal or bronchial abnormality.", "stem": "A 70-year-old man is reviewed 48 hours after uncomplicated TEVAR for a descending thoracic aneurysm. He reports mild malaise and low-grade fever. Temperature is 37.7°C, HR 88 bpm and BP 128/72 mmHg. WCC is 10.8 × 10⁹/L and CRP is 58 mg/L. Initial blood cultures are negative. CTA findings are shown in the exhibit.\n\nWhat is the most likely diagnosis?", "options": {"A": "Thoracic endograft infection", "B": "Aortobronchial fistula", "C": "TEVAR implantation syndrome", "D": "Type Ia endoleak", "E": "Acute type A dissection"}, "answer": "C", "explanation": "TEVAR implantation syndrome is a recognised inflammatory response following endograft placement. Patients may develop low-grade fever, mild leucocytosis and a rise in inflammatory markers despite negative cultures and reassuring imaging. In high-risk aortic procedures, it is still reasonable to perform a septic screen to exclude other causes. If no infective source is found and imaging is reassuring, the most likely cause is TEVAR implantation syndrome.", "why_not": "A is not supported by the imaging findings or negative cultures. B would usually present with haemoptysis or imaging evidence of fistulation. D is excluded by the CTA findings. E is not suggested by the clinical presentation or imaging.", "editorial_trap": "Early fever after TEVAR is not synonymous with graft infection. Interpretation requires correlation of timing, imaging and microbiological findings."}, {"id": "THO-026", "number": 26, "internal_title": "Post-TEVAR distal stent-induced new entry", "exhibit": "Synthetic CTA centreline/MPR:\n\n- Previous TEVAR from zone 3 to distal descending thoracic aorta\n- Proximal seal intact\n- Covered thoracic false lumen thrombosed proximally\n- New contrast entry at the distal stent edge\n- False lumen reperfusion below the distal stent edge\n- Distal descending thoracic aorta enlarged from 46 mm to 57 mm\n- Coeliac artery, SMA and renal arteries patent", "stem": "A 63-year-old man underwent TEVAR 3 years ago for complicated type B dissection. Surveillance imaging had previously shown favourable remodelling of the proximal descending thoracic aorta. He now reports recurrent interscapular discomfort. CTA findings are shown in the exhibit. The proximal seal remains intact.\n\nWhat is the most appropriate interpretation?", "options": {"A": "Type Ia endoleak", "B": "Type II endoleak", "C": "Expected post-dissection remodelling", "D": "Distal stent-induced new entry", "E": "Thoracic graft infection"}, "answer": "D", "explanation": "The key finding is new contrast entry at the distal stent edge with reperfusion of the false lumen and distal aortic enlargement. This is consistent with distal stent-induced new entry rather than proximal seal failure. It can re-pressurise the false lumen and drive aneurysmal degeneration.", "why_not": "A would imply proximal seal failure, but the proximal seal is intact. B undercalls the mechanism and implies a branch-flow endoleak rather than a new entry at the stent edge. C is contradicted by recurrent false lumen perfusion and aortic growth. E would need clinical or imaging features of infection, which are not described.", "editorial_trap": "A patent proximal seal does not mean the repair is durable forever. The distal stent edge can become the new failure point."}, {"id": "THO-027", "number": 27, "internal_title": "Thoracic aortic aneurysm in suspected genetic aortopathy", "exhibit": "No image required. The relevant CTA anatomy is: fusiform descending thoracic aneurysm 58 mm, long proximal and distal landing zones, no dissection flap, mild thoracic tortuosity and suitable iliac access.", "stem": "A 38-year-old man is referred with an asymptomatic 58 mm fusiform descending thoracic aortic aneurysm. CTA shows long proximal and distal landing zones, no dissection flap, mild thoracic tortuosity and suitable iliac access. He is tall, has pectus deformity and marked joint hypermobility.\n\nWhat is the most appropriate management principle?", "options": {"A": "Standard TEVAR", "B": "Annual surveillance", "C": "TEVAR with 25% oversizing", "D": "Open surgical repair", "E": "Anticoagulation"}, "answer": "D", "explanation": "This is a young patient with phenotypic features suggesting heritable thoracic aortic disease. Although the anatomy appears suitable for TEVAR, durable open repair is generally favoured when intervention is required and the patient is fit. As part of the work-up, genetic testing is required to confirm the underlying genetic aortopathy and guide operative thresholds, surveillance and family screening. Endovascular repair may be used selectively as a bridge or in emergencies, but it is not the default definitive treatment in suspected connective tissue disease.", "why_not": "A is tempting because the landing zones are good, but the underlying disease biology makes standard TEVAR a poor definitive choice. B is inappropriate for a 58 mm descending thoracic aneurysm in this context. C adds excessive oversizing to fragile aortic tissue. E does not treat aneurysm risk.", "editorial_trap": "Good landing zones do not automatically mean good TEVAR candidate. The aortic biology matters."}, {"id": "THO-028", "number": 28, "internal_title": "Delayed subclavian steal after zone 2 TEVAR", "exhibit": "Synthetic CTA arch and neck vessels:\n\n- Previous zone 2 TEVAR\n- Thoracic stent graft well positioned\n- No endoleak\n- Occluded proximal LSA origin\n- Right vertebral artery small\n- Left vertebral artery dominant\n\nDuplex report:\n\n- Left vertebral artery: retrograde flow throughout the cardiac cycle\n- Left subclavian distal waveform: damped monophasic flow\n- Right vertebral artery: antegrade low-volume flow", "stem": "A 76-year-old man underwent urgent zone 2 TEVAR for a symptomatic descending thoracic aneurysm 6 weeks ago. He now reports dizziness and visual disturbance when using his left arm. Duplex findings are shown above.\n\nWhat is the most appropriate management?", "options": {"A": "Antiplatelet therapy alone", "B": "Extension of the thoracic stent graft", "C": "Right carotid endarterectomy", "D": "Embolisation of the left vertebral artery", "E": "Left carotid-subclavian bypass"}, "answer": "E", "explanation": "This is symptomatic subclavian steal after zone 2 TEVAR. The duplex demonstrates retrograde left vertebral flow, and the patient has vertebrobasilar symptoms precipitated by left arm use. Revascularisation of the left subclavian artery, usually by carotid-subclavian bypass or transposition depending anatomy, is the best option offered.", "why_not": "A does not correct symptomatic vertebrobasilar steal. B does not restore LSA or vertebral flow. C is irrelevant unless there is separate carotid disease. D would worsen posterior circulation risk.", "editorial_trap": "The stem does not spell out LSA coverage. The candidate must know the implication of zone 2 TEVAR and interpret the duplex."}, {"id": "THO-029", "number": 29, "internal_title": "Acute TBAD with refractory hypertension", "exhibit": "Synthetic CTA centreline/MPR:\n\n- Acute type B dissection beginning 25 mm distal to LSA\n- No rupture\n- No visceral malperfusion\n- True lumen compressed but visceral branches patent\n- Descending thoracic aorta 40 mm\n- Proximal landing zone length 25 mm\n- Iliac access suitable", "stem": "A 57-year-old man presents with acute type B dissection. He remains in a monitored bed on IV beta-blockade and vasodilator therapy. Despite three intravenous agents, his systolic BP remains 165–180 mmHg. His pain has improved. Creatinine, lactate and limb perfusion are normal. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate management?", "options": {"A": "Continue medical therapy", "B": "Branched TEVAR", "C": "TEVAR with carotid-subclavian bypass", "D": "TEVAR", "E": "Repeat CTA in 48–72 hours"}, "answer": "D", "explanation": "Refractory hypertension despite appropriate intravenous anti-impulse therapy is a complicated or high-risk feature in acute TBAD. The exhibit gives a 25 mm proximal landing zone distal to the LSA, which is adequate for standard TEVAR in this question. There is no need for branched TEVAR or carotid-subclavian bypass.", "why_not": "A is less appropriate once hypertension remains refractory despite multiple intravenous agents. B is unnecessary when the proximal landing zone is adequate. C is unnecessary because the repair does not require LSA coverage. E delays treatment of refractory hypertension.", "editorial_trap": "The candidate must use the landing-zone measurement. This is not a zone 2/LSA strategy question; it is standard TEVAR anatomy with refractory hypertension."}, {"id": "THO-030", "number": 30, "internal_title": "Late thoracic endograft infection", "exhibit": "Synthetic CTA chest:\n\n- Previous TEVAR in descending thoracic aorta\n- Stent graft well positioned\n- No endoleak\n- No sac expansion\n- New perigraft soft tissue thickening\n- Small gas locules adjacent to the graft\n- No oesophageal contrast leak\n- No active extravasation", "stem": "A 71-year-old man presents 18 months after TEVAR for a descending thoracic aneurysm. He has 6 weeks of malaise, weight loss and intermittent sweats. Temperature is 37.4°C, HR 88 bpm and BP 124/70 mmHg. CRP is 87 mg/L. Two sets of blood cultures grow Enterococcus faecalis. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate next step?", "options": {"A": "Treat as TEVAR implantation syndrome", "B": "Relining with a further thoracic endograft", "C": "Bronchoscopy", "D": "Annual CTA surveillance", "E": "MDT"}, "answer": "E", "explanation": "This is concerning for thoracic endograft infection: late presentation, constitutional symptoms, raised CRP, positive blood cultures and perigraft gas/soft tissue change. He is not actively bleeding and there is no haemoptysis or clear airway fistula in the stem. The best next step is MDT assessment for graft infection, targeted antimicrobial therapy and source-control planning.", "why_not": "A is an early post-implant inflammatory syndrome, not an 18-month presentation with positive blood cultures and perigraft gas. B may temporise selected bleeding or rupture scenarios, but it is not the default response to suspected established graft infection. C may be relevant if there is haemoptysis or suspected airway communication, but this stem is primarily graft infection without active bleeding or airway symptoms. D is unsafe.", "editorial_trap": "This is not early post-implantation fever, and it is not a haemoptysis/aortobronchial fistula stem. Timing, microbiology and perigraft gas should trigger graft infection MDT management."}, {"id": "THO-031", "number": 31, "internal_title": "Native infected descending thoracic aneurysm", "exhibit": "Synthetic CTA chest:\n\n- Saccular aneurysm arising from the lateral descending thoracic aorta\n- Maximum diameter 42 mm\n- Irregular wall\n- Periaortic soft-tissue stranding\n- No established rupture\n- No prior thoracic graft\n- Proximal and distal landing zones appear adequate", "stem": "A 69-year-old man presents with 8 days of fever, malaise and worsening interscapular pain. Three months earlier, CT performed for renal colic showed mild thoracic aortic atheroma but no aneurysm. Current blood cultures grow Staphylococcus aureus. CRP is 214 mg/L and WCC is 17.8 × 10⁹/L. CTA findings are shown in the exhibit. He is physiologically fit for major surgery.\n\nWhat is the most appropriate management?", "options": {"A": "Repeat CTA in 3 months", "B": "IV antibiotics alone", "C": "TEVAR with targeted antimicrobial therapy", "D": "Open thoracic aortic repair", "E": "Best medical therapy and interval imaging"}, "answer": "D", "explanation": "This is a native infected descending thoracic aneurysm: fever, bacteraemia, pain, inflammatory change and rapid development of a saccular aneurysm. Degenerative aneurysm size thresholds do not apply. In a physiologically fit patient, open repair with debridement/source control is the gold standard treatment. TEVAR with prolonged antimicrobial therapy may be considered in patients unfit for open repair, as a bridge, or in selected emergency situations.", "why_not": "A delays treatment of an unstable infected aneurysm. B under-treats the rupture and source-control problem. C may be appropriate if open repair is unsuitable, but the stem gives no reason to avoid open surgery. E is inadequate for a rapidly developing infected aneurysm.", "editorial_trap": "The aneurysm is not large by degenerative standards, but infection changes the threshold and the treatment logic."}, {"id": "THO-032", "number": 32, "internal_title": "Inflammatory aortitis / IgG4-related disease", "exhibit": "Synthetic CTA chest/abdomen:\n\n- Diffuse circumferential wall thickening of descending thoracic and suprarenal abdominal aorta\n- Periaortic soft-tissue mantle\n- Mild aneurysmal dilatation of descending thoracic aorta to 44 mm\n- No dissection flap\n- No penetrating ulcer\n- Renal arteries patent\n- No gas or fluid collection", "stem": "A 62-year-old man is referred after CTA for back pain shows abnormal thickening around the descending thoracic and suprarenal abdominal aorta. He has weight loss and raised inflammatory markers. Blood cultures are negative. Serum IgG4 is elevated. There is no haemodynamic instability and no evidence of rupture.\n\nWhat is the most appropriate initial management principle?", "options": {"A": "High-dose steroids", "B": "TEVAR during this admission", "C": "Systemic anticoagulation", "D": "Open thoracoabdominal replacement", "E": "Annual surveillance without treatment"}, "answer": "A", "explanation": "The imaging and serology suggest inflammatory aortitis, such as IgG4-related aortitis/periaortitis. In the absence of rupture, malperfusion or a large aneurysm requiring repair, initial management is high-dose steroid therapy after appropriate diagnostic assessment. Intervention may be needed if aneurysmal degeneration, rupture risk, occlusive complications or diagnostic uncertainty develops.", "why_not": "B does not treat the inflammatory process and is not indicated for a stable 44 mm aorta without rupture features. C does not address aortitis. D is disproportionate as initial therapy. E ignores active inflammatory disease.", "editorial_trap": "This is not an infected aneurysm and not an acute aortic syndrome. The pattern should push the candidate toward inflammatory aortitis management."}, {"id": "THO-033", "number": 33, "internal_title": "Residual descending dissection after previous type A repair", "exhibit": "Synthetic CTA centreline/MPR:\n\n- Previous ascending aortic replacement for type A dissection\n- Residual chronic dissection from distal arch to iliac bifurcation\n- Descending thoracic aorta enlarged from 46 mm to 59 mm over 18 months\n- False lumen remains patent in descending thoracic aorta\n- Visceral branches patent\n- Proximal landing would require zone 2 coverage", "stem": "A 58-year-old man previously underwent emergency ascending aortic replacement for acute type A dissection. Surveillance CTA now shows progressive aneurysmal degeneration of the residual dissected descending thoracic aorta. He is fit and asymptomatic. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate management?", "options": {"A": "Continue annual surveillance", "B": "Medical therapy alone", "C": "TEVAR", "D": "Carotid-subclavian bypass alone", "E": "Open thoracoabdominal replacement"}, "answer": "C", "explanation": "Residual distal dissection after type A repair can undergo progressive aneurysmal degeneration. A descending thoracic aorta enlarging to 59 mm in a fit patient warrants repair planning. In this stem, the next treatment strategy is TEVAR, with appropriate planning for zone 2 landing and left subclavian management if required.", "why_not": "A and B are too passive for progressive aneurysmal enlargement to 59 mm. D may be an adjunct if zone 2 coverage is required, but it does not treat the aneurysm. E may be required in selected anatomy, but the stem gives a descending thoracic target suitable for TEVAR rather than a thoracoabdominal open-repair problem.", "editorial_trap": "Repairing the ascending aorta does not remove the need to treat progressive distal dissecting aneurysmal degeneration."}, {"id": "THO-034", "number": 34, "internal_title": "SMA branch instability after branched TAAA repair", "exhibit": "Synthetic CTA after branched endovascular TAAA repair:\n\n- Four-vessel branched repair to coeliac, SMA and both renal arteries\n- Aneurysm sac stable\n- Coeliac and renal bridging stents patent\n- SMA bridging stent kinked at branch origin\n- Reduced enhancement of proximal jejunal branches\n- No type I or III endoleak visible", "stem": "A 73-year-old man underwent branched endovascular repair of an extent II thoracoabdominal aneurysm 9 months ago. He now reports post-prandial abdominal pain and 6 kg weight loss. Lactate is normal. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate next step?", "options": {"A": "Annual CTA surveillance", "B": "Mesenteric duplex assessment", "C": "SMA branch relining", "D": "Open thoracoabdominal explant", "E": "Antiplatelet therapy alone"}, "answer": "C", "explanation": "The symptoms are consistent with chronic mesenteric ischaemia after branched repair, and the CTA already shows a mechanical problem with the SMA bridging stent. In this context, the best answer is reintervention on the SMA branch, such as relining or extension depending anatomy.", "why_not": "A ignores symptomatic branch compromise. B could be useful if CTA were equivocal, but the CTA already demonstrates a kinked SMA bridging stent with compatible symptoms. D is disproportionate as first-line if branch reintervention is feasible. E does not correct a mechanical stent problem.", "editorial_trap": "A stable aneurysm sac does not exclude clinically important branch failure after complex endovascular repair."}, {"id": "THO-035", "number": 35, "internal_title": "Shaggy thoracic aorta and embolic risk", "exhibit": "Synthetic CTA arch and descending thoracic aorta:\n\n- 61 mm descending thoracic aneurysm\n- Adequate proximal and distal seal lengths\n- Circumferential irregular mural thrombus throughout the arch\n- Mobile-appearing thrombus projecting into lumen at lesser curve\n- Iliac access adequate\n- No significant carotid stenosis", "stem": "An 80-year-old man is assessed for TEVAR for a 61 mm descending thoracic aneurysm. He is independent and wishes to proceed if the risk is acceptable. CTA findings are shown in the exhibit. He had a minor embolic stroke 3 months ago.\n\nWhich issue most affects the decision to offer standard TEVAR?", "options": {"A": "Risk of type II endoleak", "B": "Risk of embolic stroke", "C": "Risk of renal infarction", "D": "Risk of acute limb ischaemia", "E": "Need for renal fenestrations"}, "answer": "B", "explanation": "The aneurysm may be anatomically sealable, but the shaggy arch and descending thoracic thrombus create a major embolic risk during wire, catheter and stent-graft manipulation. Prior embolic stroke reinforces the concern. Solid organ infarction and acute limb ischaemia are also plausible embolic complications, but embolic stroke is the dominant issue affecting whether standard TEVAR should be offered.", "why_not": "A is not the dominant risk in this morphology. C and D are plausible embolic complications, but less central than stroke in a shaggy arch/descending thoracic aorta with recent embolic stroke. E is irrelevant for an isolated descending thoracic aneurysm with adequate distal seal.", "editorial_trap": "This is not a seal-zone question. It is a procedural embolic-risk question."}, {"id": "THO-036", "number": 36, "internal_title": "Post-TEVAR type III endoleak from component separation", "exhibit": "Synthetic CTA centreline/MPR:\n\n- Previous TEVAR from zone 3 to distal descending thoracic aorta\n- Proximal seal intact\n- Distal end of stent graft unchanged\n- New focal separation between overlapping thoracic stent-graft components\n- Contrast opacification of the aneurysm sac at the overlap zone\n- Sac diameter increased from 58 mm to 66 mm\n- No perigraft gas or inflammatory change", "stem": "A 76-year-old man underwent TEVAR for a descending thoracic aneurysm 5 years ago. Surveillance CTA now shows sac expansion. He has no fever, pain or constitutional symptoms. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate management?", "options": {"A": "Annual CTA surveillance", "B": "Reline the graft", "C": "Intercostal artery embolisation", "D": "Open explant", "E": "Long-term antibiotics"}, "answer": "B", "explanation": "This is a type III endoleak from component separation, with direct sac pressurisation and aneurysm growth. The most appropriate treatment is endovascular relining if anatomically feasible.", "why_not": "A is unsafe with sac expansion and direct endoleak. C would be relevant for selected type II endoleaks, not component separation. D may be required if endovascular repair fails or is unsuitable, but relining is the appropriate first strategy here. E is not supported by the clinical or imaging findings.", "editorial_trap": "Sac expansion after TEVAR is not always proximal or distal seal failure. Component separation is a device-related failure requiring repair."}, {"id": "THO-037", "number": 37, "internal_title": "Residual dissection after type A repair requiring zone 2 TEVAR and LSA strategy", "exhibit": "Synthetic CTA arch/descending thoracic aorta:\n\n- Previous ascending aortic replacement for type A dissection\n- Residual chronic dissection extending from distal arch into descending thoracic aorta\n- Proximal descending thoracic aorta now 61 mm\n- Primary residual entry at the distal arch\n- Zone 3 landing inadequate\n- Zone 2 landing adequate\n- Left vertebral artery dominant\n- No LIMA graft shown", "stem": "A 64-year-old man previously underwent emergency ascending aortic replacement for acute type A dissection. Surveillance CTA now shows progressive aneurysmal degeneration of the residual dissected proximal descending thoracic aorta. He is fit for intervention. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate treatment strategy?", "options": {"A": "Continue annual surveillance", "B": "Zone 3 TEVAR", "C": "Zone 2 TEVAR", "D": "Left carotid-subclavian bypass followed by zone 2 TEVAR", "E": "Open thoracoabdominal replacement"}, "answer": "D", "explanation": "He has progressive aneurysmal degeneration of residual distal dissection after type A repair. Zone 3 seal is inadequate and zone 2 seal is required. Because the left vertebral artery is dominant, planned left subclavian coverage should be preceded by revascularisation if feasible. Carotid-subclavian bypass followed by zone 2 TEVAR is therefore the best option offered.", "why_not": "A is too passive for progressive enlargement to 61 mm. B does not provide an adequate proximal seal. C provides the seal but ignores the left subclavian/vertebral issue. E may be needed in selected anatomy, but this stem provides a feasible endovascular zone 2 strategy.", "editorial_trap": "This is not simply residual dissection after type A repair equals TEVAR. The landing zone and left subclavian strategy still have to be planned."}, {"id": "THO-038", "number": 38, "internal_title": "Asymptomatic Kommerell diverticulum surveillance", "exhibit": "Synthetic CTA arch/descending thoracic aorta:\n\n- Aberrant right subclavian artery arising distal to left subclavian artery\n- Kommerell diverticulum diameter: 29 mm\n- No dissection\n- No aneurysmal degeneration of descending thoracic aorta\n- Mild posterior oesophageal impression", "stem": "A 52-year-old woman is investigated after an incidental abnormality is seen on CT pulmonary angiography. CTA findings are shown in the exhibit. She has no dysphagia, no arm symptoms and no chest or back pain.\n\nWhat is the most appropriate management?", "options": {"A": "Right subclavian revascularisation with diverticulum exclusion", "B": "Open arch replacement", "C": "Oesophageal dilatation", "D": "Surveillance imaging", "E": "Anticoagulation"}, "answer": "D", "explanation": "This is an asymptomatic aberrant right subclavian artery with a modest Kommerell diverticulum and no dissection or compressive symptoms. Surveillance is appropriate. Intervention is more strongly considered with symptoms, larger diverticulum, growth, dissection, rupture features or associated aneurysmal disease.", "why_not": "A is appropriate for selected symptomatic or higher-risk anatomy, but not this incidental stable presentation. B is disproportionate. C treats a symptom she does not have. E does not address the congenital arch anomaly or diverticulum.", "editorial_trap": "Kommerell diverticulum is not automatically an operation. Symptoms, size, growth and associated pathology matter."}, {"id": "THO-039", "number": 39, "internal_title": "Branch-related type IIIc endoleak after branched TAAA repair", "exhibit": "Synthetic CTA after branched endovascular TAAA repair:\n\n- Four-vessel branched endograft\n- Aneurysm sac increased from 70 mm to 76 mm\n- Coeliac, SMA and renal branches patent\n- Focal contrast jet at the junction between a bridging stent and renal branch portal\n- No proximal or distal seal failure\n- No perigraft gas", "stem": "A 71-year-old man underwent branched endovascular repair of an extent II thoracoabdominal aneurysm 18 months ago. Surveillance CTA shows sac expansion. He is asymptomatic. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate management?", "options": {"A": "Continue annual surveillance", "B": "Renal branch relining", "C": "Mesenteric duplex only", "D": "Open explant as first-line", "E": "Antibiotics and PET-CT"}, "answer": "B", "explanation": "The imaging suggests a branch-related type IIIc endoleak at a renal bridging stent/branch junction with sac expansion. In fenestrated or branched repairs, this represents failure or leakage related to the fenestration or branch/bridging-stent interface rather than a standard proximal or distal seal failure. This requires treatment, commonly relining or extension of the affected bridging stent if feasible.", "why_not": "A is unsafe with sac expansion and a direct endoleak source. C may provide haemodynamic information but does not treat a visible type III branch leak. D may be needed rarely, but endovascular branch correction is the appropriate first-line strategy if feasible. E is not supported by the imaging or clinical picture.", "editorial_trap": "After branched repair, sac expansion can result from branch junction failure even when the main proximal and distal seals look intact. This is a type IIIc endoleak pattern."}, {"id": "THO-040", "number": 40, "internal_title": "Inflammatory aortitis work-up when IgG4 is normal", "exhibit": "Synthetic CTA thoracic aorta:\n\n- Circumferential thickening of descending thoracic aortic wall\n- Periaortic inflammatory mantle\n- Mild left pleural thickening\n- Descending thoracic diameter: 47 mm\n- No gas, no pseudoaneurysm, no penetrating ulcer\n- No dissection flap", "stem": "A 65-year-old man presents with thoracic back discomfort and weight loss. CTA findings are shown in the exhibit. CRP is 96 mg/L. Blood cultures are negative. Serum IgG4 is normal. FDG-PET shows avid uptake in the descending thoracic aortic wall and periaortic tissue.\n\nWhat is the most appropriate next step?", "options": {"A": "TEVAR during this admission", "B": "Open descending thoracic replacement", "C": "Anticoagulation", "D": "Tissue diagnosis and inflammatory aortitis work-up", "E": "Discharge with 5-year surveillance"}, "answer": "D", "explanation": "This is an inflammatory periaortic process rather than a straightforward degenerative aneurysm or acute aortic syndrome. IgG4 is normal, so the diagnosis remains uncertain. Before committing to major repair or immunosuppression, further inflammatory, infective and malignant work-up is needed, with tissue diagnosis if safe and appropriate.", "why_not": "A does not treat the underlying inflammatory process and is not indicated without rupture, malperfusion or major aneurysmal degen
