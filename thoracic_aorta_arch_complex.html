eration. B is disproportionate as the immediate next step. C does not address the pathology. E ignores active inflammation and systemic symptoms.", "editorial_trap": "Not every hot thickened aorta is IgG4 disease, and not every thoracic aortic abnormality is fixed with TEVAR. Diagnosis matters before treatment."}, {"id": "THO-041", "number": 41, "internal_title": "Post-TEVAR type Ia endoleak", "exhibit": "Synthetic CTA chest:\n\n- Previous TEVAR for descending thoracic aneurysm\n- Proximal seal zone in zone 3\n- New contrast at proximal graft edge\n- Aneurysm sac increased from 62 mm to 70 mm\n- Distal seal intact\n- No component separation\n- No perigraft gas\n- Proximal arch anatomy should clarify whether there is enough seal above the graft or whether proximal extension would require zone 2 coverage", "stem": "A 74-year-old man underwent TEVAR for a descending thoracic aneurysm 3 years ago. Surveillance CTA shows sac expansion. He has no fever, chest pain or constitutional symptoms. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate management?", "options": {"A": "Repeat CTA in 6 months", "B": "Contrast-enhanced ultrasound", "C": "Catheter angiography", "D": "Proximal relining", "E": "Intercostal artery embolisation"}, "answer": "D", "explanation": "This is a proximal type Ia endoleak with sac expansion. The key problem is proximal seal failure, so the treatment should correct the proximal seal, usually with proximal relining or extension if anatomy allows. Further diagnostic tests may be useful in equivocal cases, but here the CTA already demonstrates proximal graft-edge contrast with sac expansion.", "why_not": "A delays treatment of a direct endoleak with sac growth. B can help characterise endoleak in selected cases, but CTA has already shown a proximal seal problem. C may be useful for planning or intra-operative confirmation, but it is not the definitive management. E is for selected branch-flow endoleaks, not type Ia seal failure.", "editorial_trap": "Do not treat sac expansion generically. Identify the endoleak mechanism and correct the failed seal."}, {"id": "THO-042", "number": 42, "internal_title": "Lifelong surveillance after TEVAR", "exhibit": "Synthetic CTA chest:\n\n- Previous TEVAR from zone 3 to distal descending thoracic aorta\n- No endoleak\n- No stent migration\n- No sac expansion\n- Aneurysm sac reduced from 66 mm to 54 mm\n- Distal thoracic and abdominal aorta stable", "stem": "A 72-year-old man attends follow-up 2 years after TEVAR for a descending thoracic aneurysm. He is asymptomatic. CTA findings are shown in the exhibit. He asks whether he can be discharged from aortic follow-up.\n\nWhat is the most appropriate advice?", "options": {"A": "Discharge from surveillance", "B": "Repeat imaging only if symptoms develop", "C": "Continue lifelong aortic surveillance", "D": "Remove antiplatelet therapy", "E": "Convert to open repair"}, "answer": "C", "explanation": "The imaging shows favourable sac regression and no current complication, but TEVAR still requires lifelong surveillance. Late problems include endoleak, migration, component separation, sac expansion, new dissection-related pathology and progression elsewhere in the aorta.", "why_not": "A and B underestimate late device and aortic risks. D is not determined by the sac response and would depend on wider cardiovascular indications. E is not indicated with stable favourable imaging.", "editorial_trap": "A good early TEVAR result does not mean the patient is cured or can stop aortic surveillance."}, {"id": "THO-043", "number": 43, "internal_title": "Uncomplicated acute TBAD", "exhibit": "Synthetic CTA chest:\n\n- Acute type B dissection beginning 30 mm distal to LSA\n- No rupture\n- No visceral malperfusion\n- Descending thoracic aorta 38 mm\n- True lumen patent\n- False lumen patent\n- No ulcer-like projection\n- No pleural effusion", "stem": "A 60-year-old man presents with acute type B aortic dissection. His pain settles with analgesia and IV beta-blockade. Systolic BP is maintained at 110–120 mmHg. Renal function, lactate and limb perfusion are normal. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate management?", "options": {"A": "Best medical therapy and outpatient surveillance", "B": "TEVAR", "C": "TEVAR with carotid-subclavian bypass", "D": "Repeat CTA in 48–72 hours", "E": "Open descending thoracic replacement"}, "answer": "D", "explanation": "This is uncomplicated acute TBAD: pain and blood pressure have settled, and there is no rupture, malperfusion or high-risk imaging feature in the stem. The patient should continue best medical therapy, but during the acute admission early repeat CTA in 48–72 hours is appropriate to confirm stability before stepping down or discharge planning. The option of outpatient surveillance is too loose for an acute inpatient presentation.", "why_not": "A contains the correct medical-management principle but moves too quickly to outpatient surveillance without confirming early stability. B is not indicated from the information given. C adds an unnecessary LSA strategy. E is excessive.", "editorial_trap": "Uncomplicated acute TBAD is not a TEVAR-by-default diagnosis, but inpatient surveillance still needs to be active rather than casual outpatient follow-up."}, {"id": "THO-044", "number": 44, "internal_title": "Symptomatic PAU with low-risk morphology", "exhibit": "Synthetic CTA arch/descending thoracic aorta:\n\n- Penetrating ulcer on lesser curve of proximal descending thoracic aorta\n- Ulcer depth 9 mm\n- Ulcer width 13 mm\n- No intramural haematoma\n- No pleural effusion\n- Aortic diameter 36 mm\n- No periaortic haematoma", "stem": "An 81-year-old woman presents with chest pain and undergoes CTA. Troponins are negative and there is no ECG evidence of myocardial infarction. CTA findings are shown in the exhibit. Her pain settles with analgesia and blood pressure control.\n\nWhat is the most appropriate next step?", "options": {"A": "Discharge without follow-up", "B": "Repeat CTA in 48–72 hours", "C": "TEVAR during this admission", "D": "Open descending thoracic repair", "E": "Repeat CTA in 5 years"}, "answer": "B", "explanation": "This is a symptomatic penetrating aortic ulcer, so it should be treated as part of the acute aortic syndrome spectrum even though the morphology is not high risk. There is no IMH, pleural effusion, large aortic diameter or periaortic haematoma to mandate immediate TEVAR, but early repeat imaging is appropriate to confirm stability.", "why_not": "A is unsafe after symptomatic acute aortic pathology. C may be appropriate with persistent pain, progression or high-risk morphology, but those features are not present. D is disproportionate. E is too delayed for an acute symptomatic presentation.", "editorial_trap": "This is not the same as an incidental asymptomatic ulcerated plaque. Symptoms move the patient into acute-aortic-syndrome follow-up logic."}, {"id": "THO-045", "number": 45, "internal_title": "Zone 2 TEVAR with LIMA graft", "exhibit": "Synthetic CTA chest:\n\n- Descending thoracic aneurysm 63 mm\n- Proximal seal would require zone 2 coverage\n- Zone 3 landing 6 mm\n- Zone 2 landing 32 mm\n- Left internal mammary artery graft arises from LSA\n- Iliac access suitable", "stem": "A 73-year-old man is planned for elective TEVAR for a symptomatic proximal descending thoracic aneurysm. He previously underwent CABG with a patent LIMA graft. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate adjunct?", "options": {"A": "Proceed without LSA revascularisation", "B": "Left carotid-subclavian bypass", "C": "Right carotid-subclavian bypass", "D": "Vertebral artery stenting", "E": "Carotid endarterectomy"}, "answer": "B", "explanation": "Zone 2 TEVAR will cover the left subclavian artery. A patent LIMA graft is a strong indication for left subclavian revascularisation before planned coverage to preserve coronary perfusion. Left carotid-subclavian bypas A access-complication panel:\n\n- Thoracic stent graft deployed satisfactorily\n- Right external iliac artery contrast extravasation at access route\n- Retroperitoneal haematoma\n- Right common iliac artery suitable for proximal landing\n- Common femoral artery sheath still in situ", "stem": "During TEVAR for a descending thoracic aneurysm, the main device has been deployed and the aneurysm is excluded. On sheath withdrawal, the patient becomes hypotensive. Completion angiography findings are shown in the exhibit.\n\nWhat is the most appropriate immediate management?", "options": {"A": "Manual compression", "B": "Covered stent", "C": "Protamine and observation", "D": "Femoro-femoral bypass", "E": "Repeat thoracic angiography"}, "answer": "B", "explanation": "This is access-vessel rupture with active iliac extravasation and retroperitoneal bleeding. If anatomy allows, immediate endovascular control with a covered stent is the best option offered, while maintaining wire/sheath access and resuscitating the patient.", "why_not": "A will not control iliac rupture. C may be adjunctive after haemorrhage control but is not sufficient. D may be needed if endovascular repair is not possible, but covered stent control is faster and appropriate here. E ignores the cause of hypotension.", "editorial_trap": "The thoracic aneurysm may be excluded, but the life-threatening complication is now access haemorrhage."}, {"id": "THO-050", "number": 50, "internal_title": "Upper GI bleeding after TEVAR", "exhibit": "Synthetic CTA chest:\n\n- Previous TEVAR for descending thoracic aneurysm\n- Stent graft patent\n- Mild perigraft soft tissue thickening\n- No active extravasation\n- No definite gas tracking to oesophagus\n- Small hiatal hernia\n- No sac expansion", "stem": "A 70-year-old man presents 2 years after TEVAR with dysphagia and one episode of coffee-ground vomiting. Observations are HR 88 bpm, BP 126/72 mmHg, RR 18/min and temperature 37.2°C. Haemoglobin is 112 g/L. CTA findings are shown in the exhibit.\n\nWhat is the most appropriate next investigation?", "options": {"A": "Outpatient proton pump inhibitor trial", "B": "Upper GI endoscopy", "C": "TEVAR relining", "D": "PET-CT", "E": "Annual CTA surveillance"}, "answer": "B", "explanation": "He has upper GI symptoms after TEVAR, but the presentation is not one of active exsanguination and the CTA does not show definite graft-enteric fistulation. Upper GI endoscopy is the appropriate next investigation to assess for oesophageal or gastric pathology and to look for evidence of graft-enteric communication. This should still be approached cautiously in the context of prior TEVAR and discussed with the vascular team.", "why_not": "A is too passive given haematemesis-like symptoms after TEVAR. C is not justified without evidence of active bleeding or graft-related leak requiring immediate vascular control. D may be useful for suspected graft infection, but the immediate question is the source of upper GI bleeding/dysphagia. E is unsafe.", "editorial_trap": "Haematemesis after TEVAR is alarming, but if the patient is stable and CTA is not diagnostic, the next step may be endoscopic confirmation rather than reflex relining or vague MDT wording."}];

let mode = "study";
let examMarked = false;

const qContainer = document.getElementById("questions");
const studyBtn = document.getElementById("studyBtn");
const examBtn = document.getElementById("examBtn");
const markBtn = document.getElementById("markBtn");
const showBtn = document.getElementById("showBtn");
const resetBtn = document.getElementById("resetBtn");
const scoreBox = document.getElementById("scoreBox");
const modeNote = document.getElementById("modeNote");

function esc(str) {
  return String(str ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function render() {
  qContainer.innerHTML = "";
  QUESTIONS.forEach((q, idx) => {
    const card = document.createElement("article");
    card.className = "question-card";
    card.id = `q-${idx}`;
    const optionsHtml = Object.entries(q.options).map(([letter, text]) => `
      <label class="option" data-letter="${letter}">
        <input type="radio" name="q${idx}" value="${letter}">
        <span><span class="letter">${letter}.</span> ${esc(text)}</span>
      </label>
    `).join("");
    card.innerHTML = `
      <div class="q-head">
        <div class="q-num">Question ${idx + 1}</div>
        <div class="q-id">${esc(q.id || "")}</div>
      </div>
      ${q.image ? `
  <div class="exhibit-image">
    <img src="${esc(q.image)}" alt="Question ${idx + 1} imaging">
  </div>
` : ""}

<div class="exhibit"><strong>Exhibit / imaging report</strong>

${esc(q.exhibit || "")}</div>

${esc(q.exhibit || "")}</div>
      <div class="stem">${esc(q.stem || "")}</div>
      <div class="options">${optionsHtml}</div>
      <div class="feedback" id="fb-${idx}">
        <div class="result"></div>
        <h4>Explanation</h4>
        <div>${esc(q.explanation || "")}</div>
        <div class="why-not"><strong>Why not the others:</strong><br>${esc(q.why_not || "")}</div>
        <div class="trap"><strong>Editorial trap:</strong> ${esc(q.editorial_trap || "")}</div>
      </div>
    `;
    qContainer.appendChild(card);
  });
  qContainer.querySelectorAll("input[type=radio]").forEach(input => {
    input.addEventListener("change", e => {
      const idx = Number(e.target.name.replace("q",""));
      if (mode === "study") revealQuestion(idx);
      updateScore();
    });
  });
  updateModeUI();
  updateScore();
}

function selectedAnswer(idx) {
  const checked = document.querySelector(`input[name="q${idx}"]:checked`);
  return checked ? checked.value : null;
}

function revealQuestion(idx) {
  const q = QUESTIONS[idx];
  const chosen = selectedAnswer(idx);
  const card = document.getElementById(`q-${idx}`);
  const fb = document.getElementById(`fb-${idx}`);
  const result = fb.querySelector(".result");
  card.querySelectorAll("label.option").forEach(label => {
    const letter = label.dataset.letter;
    label.classList.remove("correct","incorrect");
    if (letter === q.answer) label.classList.add("correct");
    if (chosen && letter === chosen && chosen !== q.answer) label.classList.add("incorrect");
  });
  if (chosen) {
    result.textContent = chosen === q.answer ? "Correct" : `Incorrect. Correct answer: ${q.answer}`;
    result.className = "result " + (chosen === q.answer ? "good" : "bad");
  } else {
    result.textContent = `Correct answer: ${q.answer}`;
    result.className = "result";
  }
  fb.classList.add("show");
}

function hideQuestion(idx) {
  const card = document.getElementById(`q-${idx}`);
  const fb = document.getElementById(`fb-${idx}`);
  card.querySelectorAll("label.option").forEach(label => label.classList.remove("correct","incorrect"));
  fb.classList.remove("show");
}

function updateScore() {
  let answered = 0, correct = 0;
  QUESTIONS.forEach((q, idx) => {
    const ans = selectedAnswer(idx);
    if (ans) {
      answered++;
      if (ans === q.answer) correct++;
    }
  });
  scoreBox.textContent = `Score: ${correct} / ${answered}`;
}

function updateModeUI() {
  studyBtn.classList.toggle("active", mode === "study");
  examBtn.classList.toggle("active", mode === "exam");
  markBtn.style.display = mode === "exam" ? "inline-block" : "none";
  modeNote.textContent = mode === "study"
    ? "Study mode: explanations appear after you select an answer."
    : "Exam mode: explanations stay hidden until you mark the exam.";
  if (mode === "exam" && !examMarked) QUESTIONS.forEach((_, idx) => hideQuestion(idx));
}

function setMode(newMode) {
  mode = newMode;
  examMarked = false;
  QUESTIONS.forEach((_, idx) => hideQuestion(idx));
  updateModeUI();
  updateScore();
  window.scrollTo({top:0, behavior:"smooth"});
}

studyBtn.addEventListener("click", () => setMode("study"));
examBtn.addEventListener("click", () => setMode("exam"));
markBtn.addEventListener("click", () => {
  examMarked = true;
  QUESTIONS.forEach((_, idx) => revealQuestion(idx));
  updateScore();
  window.scrollTo({top:0, behavior:"smooth"});
});
showBtn.addEventListener("click", () => {
  QUESTIONS.forEach((_, idx) => revealQuestion(idx));
  updateScore();
});
resetBtn.addEventListener("click", () => {
  document.querySelectorAll("input[type=radio]").forEach(input => input.checked = false);
  QUESTIONS.forEach((_, idx) => hideQuestion(idx));
  examMarked = false;
  updateScore();
  window.scrollTo({top:0, behavior:"smooth"});
});

render();
</script>
</body>
</html>
